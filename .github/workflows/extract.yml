name: Extraction hebdomadaire des décisions

on:
  schedule:
    # Chaque dimanche à 4h UTC (6h Luxembourg)
    - cron: '0 4 * * 0'
  workflow_dispatch:
    # Déclenchement manuel depuis l'onglet Actions de GitHub

jobs:
  extract:
    name: Extraire et mettre à jour l'index statique
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4

      - name: Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install pdfplumber requests beautifulsoup4

      - name: Lancer l'extraction
        run: python extract_decisions.py

      - name: Scraper les audiences
        run: python scrape_audiences.py || true

      - name: Committer les fichiers générés
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add decisions_index.json decisions_meta.json zip_cache.json audiences.json archives/index.json || true
          git diff --cached --quiet || git commit -m "chore: mise à jour index $(date -u +'%Y-%m-%d')"
          git push || true
